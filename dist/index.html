    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #f8fafc;
        -webkit-font-smoothing: antialiased;
      }
      #root { display: flex; min-height: 100vh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
      input, select, textarea, button { font-family: inherit; }
      input::placeholder { color: rgba(0,0,0,0.35); }

      /* Global animations */
      @keyframes spin      { to { transform: rotate(360deg); } }
      @keyframes fadeUp    { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
      @keyframes pulse     { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
      @keyframes float0    { from{transform:translate(0,0) scale(1);} to{transform:translate(30px,20px) scale(1.05);} }
      @keyframes float1    { from{transform:translate(0,0) scale(1);} to{transform:translate(-20px,30px) scale(1.08);} }
      @keyframes float2    { from{transform:translate(0,0) scale(1);} to{transform:translate(20px,-25px) scale(1.03);} }
      @keyframes shimmer   { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
      @keyframes popIn     { from{opacity:0;transform:scale(0.7);} to{opacity:1;transform:scale(1);} }
      @keyframes slideRight{ from{opacity:0;transform:translateX(-20px);} to{opacity:1;transform:translateX(0);} }
      @keyframes bounce    { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

      .spin     { animation: spin 1s linear infinite; }
      .fade-up  { animation: fadeUp 0.35s ease-out; }
      .fade-in  { animation: fadeIn 0.3s ease-out; }
      .pop-in   { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
      .slide-right { animation: slideRight 0.3s ease-out; }
    </style>
